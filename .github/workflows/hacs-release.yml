name: HACS Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to verify and release
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the GitHub tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Verify tag and manifest version
        id: metadata
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]] || {
            echo "Release tag must match vX.Y.Z: $RELEASE_TAG" >&2
            exit 1
          }
          mapfile -t manifests < <(find custom_components -mindepth 2 -maxdepth 2 -name manifest.json -type f -print)
          [[ "${#manifests[@]}" -eq 1 ]] || {
            echo "Expected exactly one custom_components/*/manifest.json, found ${#manifests[@]}" >&2
            exit 1
          }
          manifest="${manifests[0]}"
          version="${RELEASE_TAG#v}"
          manifest_version="$(jq -r '.version // empty' "$manifest")"
          [[ "$manifest_version" == "$version" ]] || {
            echo "Manifest version ${manifest_version:-<missing>} does not match $RELEASE_TAG" >&2
            exit 1
          }
          tag_commit="$(git rev-parse HEAD)"
          remote_tag_commit="$(git ls-remote --tags origin "refs/tags/${RELEASE_TAG}^{}" | awk 'NR == 1 {print $1}')"
          [[ "$remote_tag_commit" == "$tag_commit" ]] || {
            echo "GitHub tag $RELEASE_TAG does not resolve to the checked-out commit" >&2
            exit 1
          }
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Create or keep published GitHub Release
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.metadata.outputs.tag }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.RELEASE_TAG;
            const { owner, repo } = context.repo;
            let release;
            try {
              ({ data: release } = await github.rest.repos.getReleaseByTag({ owner, repo, tag }));
            } catch (error) {
              if (error.status !== 404) throw error;
              try {
                ({ data: release } = await github.rest.repos.createRelease({
                  owner,
                  repo,
                  tag_name: tag,
                  name: tag,
                  draft: false,
                  prerelease: false,
                  generate_release_notes: true,
                }));
              } catch (createError) {
                if (createError.status !== 422) throw createError;
                ({ data: release } = await github.rest.repos.getReleaseByTag({ owner, repo, tag }));
              }
            }
            if (release.draft || release.prerelease) {
              core.setFailed(`Release ${tag} exists but is not a published stable release.`);
              return;
            }
            if (release.tag_name !== tag) {
              core.setFailed(`GitHub returned release ${release.tag_name} for requested tag ${tag}.`);
              return;
            }
            core.info(`Published release verified: ${release.html_url}`);
